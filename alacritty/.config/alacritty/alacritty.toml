[font]
size = 18.0

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[window]
opacity = 0
decorations = "None"

[cursor]
blink_interval = 300
blink_timeout = 3
thickness = 0.1

[cursor.style]
shape = "Block"
blinking = "Always"

[mouse]
hide_when_typing = true
